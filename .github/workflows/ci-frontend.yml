name: CI Frontend

on:
  push:
    branches: [main]
    paths: ["apps/candidate-portal/**", "apps/company-portal/**", "apps/admin/**", "packages/**"]
  pull_request:
    paths: ["apps/candidate-portal/**", "apps/company-portal/**", "apps/admin/**", "packages/**"]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: "24", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint --filter=@rassa/candidate-portal --filter=@rassa/company-portal --filter=@rassa/admin
      - run: pnpm typecheck --filter=@rassa/candidate-portal --filter=@rassa/company-portal --filter=@rassa/admin
