services:
  mongodb:
    image: mongo:latest
    ports: [ "27017:27017" ]
    volumes: [ mongo-data:/data/db ]

  redis:
    image: redis:8-alpine
    ports: [ "6379:6379" ]

  qdrant:
    image: qdrant/qdrant:latest
    ports: [ "6333:6333" ]
    volumes: [ qdrant-data:/qdrant/storage ]
    configs: [ { source: qdrant_config, target: /qdrant/config/config.yaml } ]

  minio:
    image: minio/minio:latest
    ports: [ "9000:9000", "9001:9001" ]
    command: server /data --console-address ":9001"
    volumes: [ minio-data:/data ]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  backend:
    build:
      context: .
      dockerfile: infra/docker/nestjs.Dockerfile
    ports: [ "4000:4000" ]
    env_file: .env
    depends_on: [ mongodb, redis, minio ]

  ai-fastapi:
    build:
      context: .
      dockerfile: infra/docker/fastapi.Dockerfile
    ports: [ "8000:8000" ]
    env_file: .env
    depends_on: [ mongodb, qdrant, redis ]

  candidate-portal:
    build:
      context: .
      dockerfile: infra/docker/nextjs.Dockerfile
      args: { APP: candidate-portal }
    ports: [ "3000:3000" ]
    env_file: .env
    depends_on: [ backend ]

  company-portal:
    build:
      context: .
      dockerfile: infra/docker/nextjs.Dockerfile
      args: { APP: company-portal }
    ports: [ "3001:3001" ]
    env_file: .env
    depends_on: [ backend ]

  admin:
    build:
      context: .
      dockerfile: infra/docker/nextjs.Dockerfile
      args: { APP: admin }
    ports: [ "3002:3002" ]
    env_file: .env
    depends_on: [ backend ]

volumes:
  mongo-data:
  qdrant-data:
  minio-data:

configs:
  qdrant_config:
    file: ./infra/qdrant/config.yaml
